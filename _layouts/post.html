---
layout: default
---

<article class="post">

<h1>{{ page.title }}</h1>
  {% if page.date %}
  <p class="post-date">{{ page.date | date: "%b %-d, %Y" }}</p>
  {% endif %}

<div class="post-content">
{{ content }}
</div>

<p class="post-tags">
{% for tag in page.tags %}
  <a href="{{ '/tags.html' | relative_url }}#{{ tag }}">#{{ tag }}</a>{% unless forloop.last %} {% endunless %}
{% endfor %}
</p>
</article>
